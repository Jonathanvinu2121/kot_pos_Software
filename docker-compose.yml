# docker-compose.yml
services:
  postgres:
    image: postgres:16
    container_name: kot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kot
      POSTGRES_PASSWORD: kot_dev_pw
      POSTGRES_DB: restaurant_pos
    ports:
      - "5432:5432"
    volumes:
      - kot_pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: kot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - kot_mongo_data:/data/db

volumes:
  kot_pg_data:
  kot_mongo_data:
